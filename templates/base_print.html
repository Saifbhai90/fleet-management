<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Print View{% endblock %}</title>

  <!-- Minimal CSS for clean report layout -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .print-container {
      padding: 20px 20px 40px 20px;
    }
    @media print {
      .no-print {
        display: none !important;
      }
      body {
        margin: 0;
        padding: 0;
      }
    }
    @page {
      margin: 0;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Back / Print toolbar — hidden when actually printing -->
  <div class="no-print" style="position:sticky;top:0;z-index:100;background:#1e293b;padding:8px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
    <button onclick="window.history.back()" style="background:#334155;color:#e2e8f0;border:none;border-radius:8px;padding:8px 16px;font-size:0.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
      <i class="bi bi-arrow-left"></i> Back
    </button>
    <button onclick="window.print()" style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:0.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
      <i class="bi bi-printer"></i> Print
    </button>
    <span style="color:#94a3b8;font-size:0.8rem;margin-left:auto;">Press <kbd style="background:#334155;color:#e2e8f0;padding:2px 6px;border-radius:4px;font-size:0.75rem;">Ctrl+P</kbd> to print</span>
  </div>
  <div class="print-container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>

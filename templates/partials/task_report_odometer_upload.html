{# Odoo / odometer photo — same 1080×1440 frame + GPS stamp as check-in/check-out (fleetStampAttendancePhoto). #}
<input type="file" id="odomGlobalFileInput" class="d-none" accept="image/jpeg,image/png,image/webp,.jpg,.png,.webp" capture="environment" aria-hidden="true">
<script>
(function() {
  var UP = {{ url_for('api_task_report_odometer_photo_upload') | tojson }};
  var fileInp = document.getElementById('odomGlobalFileInput');
  if (!fileInp) return;

  function csrfHeaders() {
    var f = document.getElementById('batchForm');
    var t = f && f.querySelector('input[name="csrf_token"]');
    var h = { 'Content-Type': 'application/json' };
    if (t && t.value) h['X-CSRFToken'] = t.value;
    return h;
  }

  function rowEditUnlocked(rowId) {
    var m = document.getElementById('row_' + rowId + '_edit_mode');
    return m && m.value === '1';
  }

  function fetchGpsForOdometer(cb) {
    if (!navigator.geolocation) return cb(null, null, null);
    navigator.geolocation.getCurrentPosition(
      function(p) { cb(p.coords.latitude, p.coords.longitude, p.coords.accuracy); },
      function() { cb(null, null, null); },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
    );
  }

  function odometerStampOpts(rowId, lat, lng, accuracyMeters) {
    var ctx = (typeof window.fleetGetOdometerStampContext === 'function')
      ? window.fleetGetOdometerStampContext(rowId)
      : {};
    return {
      line1Prefix: 'Odoo meter GPS+Cam',
      lat: lat,
      lng: lng,
      accuracyMeters: accuracyMeters,
      projectName: ctx.projectName,
      districtName: ctx.districtName,
      countryName: ctx.countryName,
      countryCode: ctx.countryCode,
      countryFlag: ctx.countryFlag,
      vehicleNo: ctx.vehicleNo,
      driverName: ctx.driverName || '',
      rearCamera: true,
      useFixedFrame: true,
      maxSide: 2048,
      quality: 0.88
    };
  }

  function stampAndUpload(rowId, dataUrl, lat, lng, accuracyMeters) {
    if (typeof window.fleetStampAttendancePhoto !== 'function') {
      return Promise.reject(new Error('Photo stamp not loaded — refresh the page.'));
    }
    return window.fleetStampAttendancePhoto(dataUrl, null, odometerStampOpts(rowId, lat, lng, accuracyMeters))
      .then(function(res) { return uploadJpeg(rowId, res.dataUrl); });
  }

  function setRowPhotoUi(rowId, url) {
    var row = document.querySelector('.odom-url-input[data-row="' + rowId + '"]');
    if (!row) return;
    row.value = url || '';
    var cell = row.closest('.odometer-cell');
    if (!cell) return;
    var wrap = cell.querySelector('.odom-ctrl-wrap');
    if (!wrap) return;
    var ph = cell.querySelector('.odom-thumb-placeholder');
    var link = cell.querySelector('.odom-thumb-link');
    var clr = cell.querySelector('.odom-clear-btn');
    var btn = cell.querySelector('.odom-photo-btn');
    var inline = btn && btn.querySelector('.odom-inline-thumb');
    if (url) {
      if (ph) ph.classList.add('d-none');
      if (link) {
        link.setAttribute('data-url', url);
        var im0 = link.querySelector('img');
        if (im0) im0.src = url;
        link.classList.remove('d-none');
      } else {
        var thumbBtn = document.createElement('button');
        thumbBtn.type = 'button';
        thumbBtn.className = 'att-photo-fullview-btn p-0 border-0 bg-transparent d-inline-block rounded odom-thumb-link';
        thumbBtn.setAttribute('data-url', url);
        thumbBtn.setAttribute('data-label', 'Odoo meter photo');
        thumbBtn.title = 'Odoo meter — full view';
        var im = document.createElement('img');
        im.src = url;
        im.alt = 'Odoo meter';
        im.className = 'rounded border odom-thumb';
        im.style.cssText = 'max-height:44px;max-width:64px;object-fit:cover;';
        thumbBtn.appendChild(im);
        wrap.insertBefore(thumbBtn, wrap.firstChild);
      }
      if (clr) clr.classList.remove('d-none');
      if (btn && inline) {
        inline.src = url;
        inline.classList.remove('d-none');
        inline.classList.add('border-success');
        btn.classList.add('border-success');
      }
    } else {
      if (ph) ph.classList.remove('d-none');
      if (link) link.remove();
      if (clr) clr.classList.add('d-none');
      if (btn && inline) {
        inline.removeAttribute('src');
        inline.classList.add('d-none');
        inline.classList.remove('border-success');
        btn.classList.remove('border-success');
      }
    }
  }

  function uploadJpeg(rowId, jpegDataUrl) {
    return fetch(UP, {
      method: 'POST',
      headers: csrfHeaders(),
      body: JSON.stringify({ photo_base64: jpegDataUrl })
    }).then(function(r) {
      return r.text().then(function(txt) {
        var body = {};
        try { body = txt ? JSON.parse(txt) : {}; } catch (e) {}
        return { ok: r.ok, body: body };
      });
    }).then(function(res) {
      if (!res.ok || !res.body.ok) throw new Error((res.body && res.body.message) || 'Upload failed');
      setRowPhotoUi(rowId, res.body.url);
    });
  }

  function processAnyImageSource(rowId, dataUrl, lat, lng, accuracyMeters) {
    return stampAndUpload(rowId, dataUrl, lat, lng, accuracyMeters);
  }

  function setOdomBusy(rowId, busy) {
    var btn = document.querySelector('.odom-photo-btn[data-row="' + rowId + '"]');
    if (!btn) return;
    btn.disabled = !!busy;
    if (busy) btn.setAttribute('aria-busy', 'true');
    else btn.removeAttribute('aria-busy');
  }

  function runWithGps(rowId, dataUrl, fromRear) {
    setOdomBusy(rowId, true);
    fetchGpsForOdometer(function(lat, lng, acc) {
      var opts = odometerStampOpts(rowId, lat, lng, acc);
      if (fromRear) opts.rearCamera = true;
      if (typeof window.fleetStampAttendancePhoto !== 'function') {
        setOdomBusy(rowId, false);
        alert('Photo stamp not loaded — refresh the page.');
        return;
      }
      window.fleetStampAttendancePhoto(dataUrl, null, opts)
        .then(function(res) { return uploadJpeg(rowId, res.dataUrl); })
        .catch(function(err) { alert(err.message || String(err)); })
        .finally(function() { setOdomBusy(rowId, false); });
    });
  }

  var pendingRowId = null;

  function openFilePickerForRow(rowId) {
    pendingRowId = rowId;
    fileInp.value = '';
    fileInp.click();
  }

  fileInp.addEventListener('change', function() {
    var rowId = pendingRowId;
    pendingRowId = null;
    if (!rowId || !fileInp.files || !fileInp.files[0]) return;
    var reader = new FileReader();
    reader.onload = function() {
      runWithGps(rowId, reader.result, false);
    };
    reader.readAsDataURL(fileInp.files[0]);
  });

  function nativeRearCamera(rowId) {
    var Cam = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Camera;
    if (!Cam || !Cam.getPhoto) {
      openFilePickerForRow(rowId);
      return;
    }
    setOdomBusy(rowId, true);
    fetchGpsForOdometer(function(lat, lng, acc) {
      Cam.getPhoto({
        quality: 90,
        allowEditing: false,
        resultType: 'base64',
        source: 'CAMERA',
        direction: 'REAR',
        saveToGallery: false
      }).then(function(photo) {
        var raw = 'data:image/jpeg;base64,' + (photo.base64String || '');
        return stampAndUpload(rowId, raw, lat, lng, acc);
      }).catch(function(err) {
        alert((err && err.message) ? err.message : 'Camera failed');
      }).finally(function() { setOdomBusy(rowId, false); });
    });
  }

  document.addEventListener('click', function(e) {
    var clr = e.target.closest('.odom-clear-btn');
    if (clr) {
      e.preventDefault();
      var rid = clr.getAttribute('data-row');
      if (!rid || !rowEditUnlocked(rid)) return;
      setRowPhotoUi(rid, '');
      return;
    }
    var btn = e.target.closest('.odom-photo-btn');
    if (!btn) return;
    e.preventDefault();
    var rowId = btn.getAttribute('data-row');
    if (!rowId || !rowEditUnlocked(rowId)) return;
    var isNative = !!(window.FleetBridge && window.FleetBridge.isNative);
    if (isNative) nativeRearCamera(rowId);
    else openFilePickerForRow(rowId);
  });

  var batchForm = document.getElementById('batchForm');
  if (batchForm) {
    batchForm.addEventListener('paste', function(e) {
      var wrap = e.target.closest('.odom-ctrl-wrap');
      if (!wrap) return;
      var rowId = wrap.getAttribute('data-row');
      if (!rowId || !rowEditUnlocked(rowId) || wrap.classList.contains('odom-wrap-locked')) return;
      var cd = e.clipboardData;
      if (!cd || !cd.items) return;
      for (var i = 0; i < cd.items.length; i++) {
        if (cd.items[i].type.indexOf('image') === -1) continue;
        e.preventDefault();
        var blob = cd.items[i].getAsFile();
        if (!blob) continue;
        var r = new FileReader();
        r.onload = function() { runWithGps(rowId, r.result, false); };
        r.readAsDataURL(blob);
        break;
      }
    });
  }
  window.taskEntrySetRowPhotoUi = setRowPhotoUi;
})();
</script>

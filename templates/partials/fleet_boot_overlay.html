{# Capacitor cold start / slow WiFi: show message until first screen paints. Zero extra requests. #}
<div id="fleetBootOverlay" class="fleet-boot-overlay" aria-live="polite" aria-busy="true" hidden>
  <div class="fleet-boot-card">
    <div class="fleet-boot-spinner" aria-hidden="true"></div>
    <p class="fleet-boot-title">Server connect ho raha hai…</p>
    <p class="fleet-boot-sub">Internet slow ho to thora wait karein</p>
  </div>
</div>
<style>
  .fleet-boot-overlay {
    position: fixed;
    inset: 0;
    z-index: 2147483000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #0f172a;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    transition: opacity 0.28s ease, visibility 0.28s ease;
  }
  .fleet-boot-overlay.fleet-boot-out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .fleet-boot-card { text-align: center; max-width: 280px; }
  .fleet-boot-spinner {
    width: 44px;
    height: 44px;
    margin: 0 auto 18px;
    border: 3px solid rgba(148, 163, 184, 0.25);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: fleetBootSpin 0.85s linear infinite;
  }
  @keyframes fleetBootSpin { to { transform: rotate(360deg); } }
  .fleet-boot-title {
    margin: 0 0 8px;
    font-size: 1.05rem;
    font-weight: 700;
    color: #f8fafc;
    letter-spacing: -0.02em;
  }
  .fleet-boot-sub {
    margin: 0;
    font-size: 0.88rem;
    line-height: 1.45;
    color: #94a3b8;
  }
</style>
<script>
(function fleetBootOverlayInit() {
  'use strict';
  try {
    var cap = window.Capacitor;
    if (!cap || !cap.isNativePlatform || !cap.isNativePlatform()) return;
    if (sessionStorage.getItem('_fleetBootOverlay') === 'done') return;

    var path = (location.pathname || '/').replace(/\/+$/, '') || '/';
    var bootPaths = { '/mobile-init': 1, '/login': 1, '/': 1, '/dashboard': 1 };
    if (!bootPaths[path]) return;

    var el = document.getElementById('fleetBootOverlay');
    if (!el) return;
    el.hidden = false;

    var finished = false;
    function finish() {
      if (finished) return;
      finished = true;
      sessionStorage.setItem('_fleetBootOverlay', 'done');
      el.classList.add('fleet-boot-out');
      window.setTimeout(function() {
        el.hidden = true;
        el.classList.remove('fleet-boot-out');
      }, 300);
      try {
        var sp = cap.Plugins && cap.Plugins.SplashScreen;
        if (sp && sp.hide) sp.hide();
      } catch (e1) { /* ignore */ }
    }

    function tryFinish() {
      if (document.readyState === 'complete') {
        requestAnimationFrame(function() {
          requestAnimationFrame(finish);
        });
      }
    }

    window.addEventListener('load', tryFinish, { once: true });
    if (document.readyState === 'complete') tryFinish();
    window.setTimeout(finish, 45000);
    window.setTimeout(function() {
      if (finished) return;
      try {
        if (typeof window.fleetReportClientDiagnostic === 'function') {
          window.fleetReportClientDiagnostic({
            event_type: 'boot_timeout',
            message: 'App open: server connect 45s+ (WiFi slow or Render wake)'
          });
        }
      } catch (e3) { /* ignore */ }
    }, 45000);
  } catch (e2) { /* ignore */ }
})();
</script>

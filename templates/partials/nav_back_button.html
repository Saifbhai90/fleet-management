{% macro nav_back_button() %}
{% set back_href = nav_back_url or nav_back_url_auto or url_for('dashboard') %}
<a href="{{ back_href }}"
   class="btn-nav-back-rounded"
   title="Go Back"
   data-fleet-nav-back="1"
   data-fleet-nav-back-href="{{ back_href|e }}"
   data-nav-from="{{ (nav_from or '')|e }}"
   onclick="return window.fleetNavigateBack(event, this);">
  <i class="bi bi-arrow-left-short"></i>
  <span>{{ nav_back_label|default(nav_back_label_auto|default('Back')) }}</span>
</a>
{% endmacro %}

{% macro nav_from_hidden() %}
{% if nav_from %}<input type="hidden" name="nav_from" value="{{ nav_from|e }}">{% endif %}
{% endmacro %}

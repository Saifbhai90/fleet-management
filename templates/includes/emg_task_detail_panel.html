{# Shared: Task ID click → Emergency Task detail (same API as Red Task Report list). #}
<div id="redTaskDetailPanel" class="card shadow-lg border-danger d-none" style="position:fixed;top:120px;left:50%;transform:translateX(-50%);width:92%;max-width:900px;z-index:1060;box-shadow:0 8px 32px rgba(0,0,0,.25)!important;">
  <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center py-2">
    <h6 class="mb-0"><i class="bi bi-clipboard2-data me-2"></i>Task Detail — <span id="redTaskDetailTitle"></span></h6>
    <button type="button" class="btn-close btn-close-white" id="redTaskDetailCloseBtn"></button>
  </div>
  <div class="card-body p-3" style="max-height:70vh;overflow-y:auto;">
    <div id="redTaskDetailLoading" class="text-center py-3 d-none"><span class="spinner-border spinner-border-sm text-danger"></span> Loading...</div>
    <div id="redTaskDetailEmpty" class="text-center py-3 text-muted d-none"><i class="bi bi-inbox me-1"></i>Task detail not found.</div>
    <table class="table table-sm table-bordered align-middle mb-0 d-none" id="redTaskDetailTable">
      <tbody id="redTaskDetailBody"></tbody>
    </table>
  </div>
  <div class="card-footer py-2 d-flex justify-content-end">
    <button class="btn btn-secondary btn-sm" id="redTaskDetailCloseBtnFooter">Close</button>
  </div>
</div>

<script>
(function() {
  function _esc(v) { var d = document.createElement('div'); d.textContent = v || ''; return d.innerHTML; }
  function _setDetailRows(data) {
    var rows = [
      ['Task ID', data.task_id],
      ['Vehicle No', data.vehicle_no],
      ['Category', data.category],
      ['Reason (SubCategory)', data.sub_category],
      ['Request From', data.request_from],
      ['Phone', data.phone],
      ['Name', data.name],
      ['Address', data.address],
      ['Received By', data.received_by],
      ['Facility Name', data.facility_name],
      ['District', data.district_name],
      ['Tehsil', data.tehsil_name],
      ['Status', data.status],
      ['Created Date', data.created_date],
      ['Completed Date/Time', data.completed_date_time]
    ];
    var body = document.getElementById('redTaskDetailBody');
    body.innerHTML = '';
    rows.forEach(function(pair) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<th style="width:32%;background:#f8f9fa;">' + _esc(pair[0]) + '</th><td>' + _esc(pair[1] || '-') + '</td>';
      body.appendChild(tr);
    });
  }

  document.addEventListener('click', function(e) {
    var link = e.target.closest('.red-taskid-link');
    if (!link) return;
    e.preventDefault();

    var taskId = link.getAttribute('data-task-id') || '';
    var taskDate = link.getAttribute('data-task-date') || '';
    var vno = link.getAttribute('data-vno') || '';
    var panel = document.getElementById('redTaskDetailPanel');
    var loading = document.getElementById('redTaskDetailLoading');
    var empty = document.getElementById('redTaskDetailEmpty');
    var table = document.getElementById('redTaskDetailTable');
    if (!panel || !loading || !empty || !table) return;

    document.getElementById('redTaskDetailTitle').textContent = taskId || 'Task';
    loading.classList.remove('d-none');
    empty.classList.add('d-none');
    table.classList.add('d-none');
    panel.classList.remove('d-none');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    var qs = new URLSearchParams({ task_id: taskId, task_date: taskDate, vehicle_no: vno });
    fetch('/api/task-report/emg-task-detail?' + qs.toString())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loading.classList.add('d-none');
        if (!data || data.ok === false) {
          empty.classList.remove('d-none');
          return;
        }
        _setDetailRows(data);
        table.classList.remove('d-none');
      })
      .catch(function() {
        loading.classList.add('d-none');
        empty.classList.remove('d-none');
      });
  });

  function _closePanel() {
    var p = document.getElementById('redTaskDetailPanel');
    if (p) p.classList.add('d-none');
  }
  function _bindClose(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('click', _closePanel);
  }
  _bindClose('redTaskDetailCloseBtn');
  _bindClose('redTaskDetailCloseBtnFooter');
})();
</script>

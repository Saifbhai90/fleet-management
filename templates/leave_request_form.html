{% extends "base.html" %}
{% block title %}New Leave Request{% endblock %}

{% block content %}
<style>
  .lr-form .card { border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .lr-form .card-header { font-weight: 600; padding: 0.75rem 1rem; }
  .lr-form .form-label { font-weight: 600; font-size: 0.875rem; }
</style>
<div class="container-fluid lr-form">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="bi bi-calendar2-plus me-2 text-primary"></i>New Leave Request</h2>
    <a href="{{ url_for('leave_request_list') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to List</a>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-primary text-white"><i class="bi bi-pencil-square me-2"></i>Leave Request Form</div>
        <div class="card-body">
          <form method="post" action="{{ url_for('leave_request_new') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3 mb-3">
              <div class="col-md-12">
                <label class="form-label">Driver <span class="text-danger">*</span></label>
                <select name="driver_id" class="form-select search-select" data-placeholder="Search driver..." required>
                  <option value="">-- Select Driver --</option>
                  {% for d in drivers %}
                  <option value="{{ d.id }}">{{ d.name }} ({{ d.driver_id or '-' }}) — {{ d.vehicle.vehicle_no if d.vehicle else 'No Vehicle' }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">From Date <span class="text-danger">*</span></label>
                <input type="text" name="from_date" class="form-control datepicker" placeholder="dd-mm-yyyy" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">To Date <span class="text-danger">*</span></label>
                <input type="text" name="to_date" class="form-control datepicker" placeholder="dd-mm-yyyy" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Leave Type</label>
                <select name="leave_type" class="form-select">
                  <option value="Leave" selected>Leave</option>
                  <option value="Sick Leave">Sick Leave</option>
                  <option value="Emergency">Emergency</option>
                  <option value="Planned Leave">Planned Leave</option>
                  <option value="Family Emergency">Family Emergency</option>
                  <option value="Half-Day">Half-Day</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Reason</label>
              <textarea name="reason" class="form-control" rows="3" placeholder="Leave ki wajah likhein (optional)"></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Submit Request</button>
              <a href="{{ url_for('leave_request_list') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

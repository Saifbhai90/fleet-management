{% extends "base.html" %}
{% block title %}Oil bill — OIL-{{ rec.id }}{% endblock %}
{% block content %}
<style>
  .oeinv-page { max-width: 100%; width: 100%; margin: 0; padding-left: 0 !important; padding-right: 0 !important; }
  .oeinv-bill { border: 1px solid #e2e8f0; border-top: 3px solid #5b21b6; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); border-radius: 10px 10px 0 0; }
  .oeinv-hero { background: linear-gradient(135deg, #f5f3ff 0%, #fff 55%); border-bottom: 1px solid #ddd6fe; border-radius: 9px 9px 0 0; }
  .oeinv-hlabel { color: #5b21b6 !important; }
  .meinv-headcard, .meinv-lines { max-width: none; width: 100%; }
  .meinv-tfoot th { background: #f5f3ff !important; border-top: 2px solid #c4b5fd !important; color: #5b21b6 !important; }
  .meinv-tfoot__amount { color: #4c1d95 !important; }
  .expense-invoice-bill { border-radius: 10px; }
  @media print {
    .navbar, .sidebar, .flash-message, .d-print-none { display: none !important; }
    .main-content { margin: 0 !important; margin-top: 0 !important; padding: 6px !important; }
    .expense-invoice-bill { border: 1px solid #000 !important; box-shadow: none !important; page-break-inside: avoid; }
    .meinv-table { font-size: 9pt; }
    .meinv-tfoot th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  /* Inherit meinv line styles from maintenance detail for consistency */
  .oeinv-page .meinv-hero { background: linear-gradient(135deg, #f5f3ff 0%, #fff 55%); border-bottom: 1px solid #ddd6fe; }
  .oeinv-page .meinv-bill { border-top: 3px solid #5b21b6; }
  .oeinv-page .meinv-pill { background: #f5f3ff; border-color: #ddd6fe; }
  .oeinv-page .meinv-pill--link { background: #eef2ff; border-color: #c7d2fe; }
  .oeinv-page .meinv-hlabel { color: #5b21b6; }
  .oeinv-page .meinv-htitle { color: #0f172a; }
  .oeinv-page .meinv-thead th { background: #faf5ff !important; border-bottom: 1px solid #e9d5ff; }
  .oeinv-page .meinv-table tbody tr:nth-child(even) { background: #fafafa; }
  .oeinv-page .meinv-k, .oeinv-page .meinv-pill__k { color: #64748b; }
  .oeinv-page .meinv-v { color: #0f172a; }
  .oeinv-page .meinv-field { border-color: #e9d5ff; }
  .oeinv-page .meinv-field--remarks { background: #faf5ff; border-color: #ddd6fe; }
  .oeinv-page .meinv-meta--tiles { background: linear-gradient(180deg, #faf5ff 0%, #f5f3ff 100%); }
</style>
<div class="container-fluid py-2 px-0 oeinv-page">
  <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2 d-print-none">
    <div class="small text-muted fw-semibold text-uppercase" style="letter-spacing:.04em">Bill view</div>
    <div class="d-flex flex-wrap gap-1">
      <a href="{{ back_url if back_url is defined else url_for('oil_expense_list') }}" class="btn btn-outline-secondary btn-sm py-1"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <button type="button" class="btn btn-primary btn-sm py-1" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
      <a href="{{ url_for('oil_expense_media', pk=rec.id) }}{% if return_to_path is defined and return_to_path %}?return_to={{ return_to_path|url_quote }}{% endif %}" class="btn btn-outline-primary btn-sm py-1"><i class="bi bi-images me-1"></i>Media</a>
    </div>
  </div>

  <div id="expense-invoice-print-root" class="oeinv-page">
  {% include 'oil_expense_invoice_body.html' %}
  </div>
</div>
{% endblock %}

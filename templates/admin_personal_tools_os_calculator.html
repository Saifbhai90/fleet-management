<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .calc-screen { font-size: 1.75rem; text-align: right; min-height: 3rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.5rem 0.75rem; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 320px; }
    .calc-grid button { height: 48px; font-weight: 600; }
  </style>
</head>
<body class="bg-light">
  <div class="container-fluid py-3">
    <div class="calc-screen mb-3 text-secondary" id="calcDisp">0</div>
    <div class="calc-grid" id="calcGrid"></div>
  </div>
  <script>
(function () {
  var disp = document.getElementById('calcDisp');
  var grid = document.getElementById('calcGrid');
  var expr = '';
  var keys = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C','⌫'];
  keys.forEach(function (k) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'btn btn-outline-secondary btn-sm';
    b.textContent = k;
    b.addEventListener('click', function () {
      if (k === 'C') { expr = ''; }
      else if (k === '⌫') { expr = expr.slice(0, -1); }
      else if (k === '=') {
        try {
          var safe = expr.replace(/×/g, '*').replace(/÷/g, '/');
          expr = String(Function('"use strict"; return (' + safe + ')')());
        } catch (e) { expr = 'Err'; }
      } else { expr += k; }
      disp.textContent = expr || '0';
    });
    grid.appendChild(b);
  });
})();
  </script>
</body>
</html>

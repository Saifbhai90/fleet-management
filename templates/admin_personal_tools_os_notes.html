<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — Fleet Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container-fluid py-3">
    <label class="form-label fw-semibold text-secondary small mb-1">Notes (saved in this browser only)</label>
    <textarea id="fleetOsNotes" class="form-control font-monospace" rows="20" style="min-height: 62vh;" spellcheck="true" placeholder="Type here…"></textarea>
  </div>
  <script>
(function () {
  var KEY = 'fleet_os_notes_v1';
  var ta = document.getElementById('fleetOsNotes');
  try { ta.value = localStorage.getItem(KEY) || ''; } catch (e) {}
  ta.addEventListener('input', function () {
    try { localStorage.setItem(KEY, ta.value); } catch (e) {}
  });
})();
  </script>
</body>
</html>

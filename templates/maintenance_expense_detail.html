{% extends "base.html" %}
{% block title %}Maintenance bill — MAINT-{{ rec.id }}{% endblock %}
{% block content %}
<style>
  /* Fill main content width — no narrow centered column with empty sides */
  .meinv-page { max-width: 100%; width: 100%; margin: 0; padding-left: 0 !important; padding-right: 0 !important; }
  .meinv-bill { border: 1px solid #e2e8f0; border-top: 3px solid #f97316; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
  .meinv-hero { background: linear-gradient(135deg, #fff7ed 0%, #fff 55%); border-bottom: 1px solid #fed7aa; }
  .meinv-hlabel { font-size: .65rem; letter-spacing: .08em; color: #c2410c; font-weight: 700; }
  .meinv-htitle { font-size: 1.1rem; font-weight: 700; line-height: 1.2; color: #0f172a; }
  .meinv-pill { display: inline-flex; align-items: center; gap: .35rem; padding: .2rem .55rem; border-radius: 999px; background: #f1f5f9; border: 1px solid #e2e8f0; }
  .meinv-pill--link { background: #eff6ff; border-color: #bfdbfe; }
  .meinv-pill__k { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; }
  .meinv-pill__v { font-size: .8rem; font-weight: 700; color: #0f172a; }
  .meinv-pill__a { font-size: .8rem; font-weight: 700; text-decoration: none; color: #1d4ed8; }
  .meinv-pill__a:hover { text-decoration: underline; color: #1e3a8a; }
  .meinv-meta--tiles { background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%); }
  .meinv-meta--4up .meinv-field { border-radius: 6px; padding: .38rem .45rem; min-height: 3.1rem; display: flex; flex-direction: column; justify-content: center; }
  .meinv-meta--4up .meinv-k { font-size: .6rem; letter-spacing: .05em; margin-bottom: .12rem; }
  .meinv-meta--4up .meinv-v { font-size: .8rem; line-height: 1.28; }
  .meinv-brick-row--2 { margin-top: .4rem; padding-top: .45rem; border-top: 1px dashed #cbd5e1; }
  .meinv-brick-row--remarks { margin-top: .45rem; }
  .meinv-field--party .meinv-v { line-height: 1.2; }
  .meinv-nums--compact { font-size: .72rem; letter-spacing: 0; }
  .meinv-field { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: .5rem .65rem; min-height: 100%; }
  .meinv-field--remarks { border-style: dashed; background: #fafafa; }
  .meinv-k { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; line-height: 1.15; margin-bottom: .2rem; }
  .meinv-v { font-size: .86rem; font-weight: 600; color: #0f172a; line-height: 1.3; word-break: break-word; }
  .meinv-mono { font-variant-numeric: tabular-nums; }
  .meinv-nums { letter-spacing: .01em; }
  .meinv-nums__sep { color: #94a3b8; font-weight: 500; }
  .meinv-remarks { font-weight: 500; font-size: .84rem; color: #334155; }
  .meinv-thead th { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; background: #f8fafc !important; border-bottom: 1px solid #e2e8f0; padding: .4rem .5rem; }
  .meinv-table { font-size: .86rem; width: 100%; }
  .meinv-table tbody td { padding: .4rem .5rem; vertical-align: middle; border-color: #e2e8f0; }
  .meinv-table tbody tr:nth-child(even) { background: #fafafa; }
  .meinv-tfoot th { background: #fff7ed !important; border-top: 2px solid #fed7aa !important; color: #9a3412; font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; padding: .5rem .5rem; }
  .meinv-tfoot__label { font-weight: 800 !important; }
  .meinv-tfoot__amount { font-size: 1.05rem !important; color: #c2410c !important; font-weight: 800 !important; }
  .meinv-headcard.expense-invoice-bill, .meinv-lines.expense-invoice-bill { max-width: none; width: 100%; }
  .meinv-lines__h { letter-spacing: .04em; color: #334155; }
  .expense-invoice-bill { border-radius: 10px; }
  @media print {
    .navbar, .sidebar, .flash-message, .d-print-none { display: none !important; }
    .main-content { margin: 0 !important; margin-top: 0 !important; padding: 6px !important; }
    .expense-invoice-bill { border: 1px solid #000 !important; box-shadow: none !important; page-break-inside: avoid; }
    .meinv-table { font-size: 9pt; }
    .meinv-tfoot th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
<div class="container-fluid py-2 px-0 meinv-page">
  <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2 d-print-none">
    <div class="small text-muted fw-semibold text-uppercase" style="letter-spacing:.04em">Bill view</div>
    <div class="d-flex flex-wrap gap-1">
      <a href="{{ back_url }}" class="btn btn-outline-secondary btn-sm py-1"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <button type="button" class="btn btn-primary btn-sm py-1" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
      <a href="{{ url_for('maintenance_expense_media', pk=rec.id) }}{% if return_to_path %}?return_to={{ return_to_path|url_quote }}{% endif %}" class="btn btn-outline-primary btn-sm py-1"><i class="bi bi-images me-1"></i>Media</a>
    </div>
  </div>

  <div id="expense-invoice-print-root">
  {% with show_work_order_link = true, mwo_preserve_qs = None %}
  {% include 'maintenance_expense_invoice_body.html' %}
  {% endwith %}
  </div>
</div>
{% endblock %}

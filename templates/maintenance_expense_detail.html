{% extends "base.html" %}
{% block content %}
<style>
  .expense-invoice-bill { max-width: 800px; margin: 0 auto; border: 1px solid #dee2e6; border-radius: 12px; background: #fff; }
  .expense-invoice-bill .inv-head { border-bottom: 2px solid #ea580c; padding: 1rem 1.25rem; background: linear-gradient(135deg, #fff7ed 0%, #fff 100%); border-radius: 12px 12px 0 0; }
  .expense-invoice-bill .inv-row { display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; padding: .35rem 0; border-bottom: 1px dashed #e9ecef; }
  .expense-invoice-bill .inv-label { min-width: 140px; color: #6c757d; font-size: .82rem; }
  .expense-invoice-bill .inv-value { font-weight: 600; }
  @media print {
    .navbar, .sidebar, .flash-message, .d-print-none { display: none !important; }
    .main-content { margin: 0 !important; margin-top: 0 !important; padding: 8px !important; }
    .expense-invoice-bill { border: 1px solid #000; box-shadow: none !important; }
  }
</style>
<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3 d-print-none">
    <h2 class="mb-0 h5"><i class="bi bi-receipt-cutoff me-2 text-primary"></i>{{ title }}</h2>
    <div class="d-flex flex-wrap gap-2">
      <a href="{{ back_url }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <button type="button" class="btn btn-primary btn-sm" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
      <a href="{{ url_for('maintenance_expense_media', pk=rec.id) }}{% if return_to_path %}?return_to={{ return_to_path|url_quote }}{% endif %}" class="btn btn-outline-primary btn-sm" rel="noopener"><i class="bi bi-images me-1"></i>Media</a>
    </div>
  </div>

  <div id="expense-invoice-print-root" class="mb-3" style="max-width:800px;margin:0 auto;">
  {% with show_work_order_link = true, mwo_preserve_qs = None %}
  {% include 'maintenance_expense_invoice_body.html' %}
  {% endwith %}
  </div>
</div>
{% endblock %}

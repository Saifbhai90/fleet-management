<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print Ready</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
  <style>
    body{margin:0;background:#111;font-family:Segoe UI,Arial,sans-serif}
    .wrap{height:100vh;display:flex;flex-direction:column}
    .head{padding:8px 12px;background:#f5f7fb;border-bottom:1px solid #d5e1f5;display:flex;justify-content:space-between;align-items:center}
    .bar{padding:7px 10px;background:#f7f9fd;border-bottom:1px solid #dfe8f8;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .stage{position:relative;flex:1;padding:8px;background:#1e1f23}
    .viewer-shell{height:100%;border:1px solid #2f333a;border-radius:10px;overflow:hidden;display:grid;grid-template-columns:170px 1fr;background:#2a2d33}
    .thumbs{background:#202329;border-right:1px solid #343946;overflow:auto;padding:8px}
    .thumb{border:2px solid transparent;border-radius:6px;padding:3px;margin-bottom:10px;cursor:pointer;background:#2b2f38}
    .thumb.active{border-color:#76a9ff}
    .thumb canvas{width:100%;height:auto;display:block;background:#fff}
    .thumb .n{color:#d0d7e5;font-size:12px;text-align:center;margin-top:3px}
    .main{position:relative;overflow:auto;background:#2b2f36}
    .page-wrap{display:flex;justify-content:center;align-items:flex-start;padding:14px}
    #mainCanvas{background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.35)}
    .ctx{position:fixed;z-index:3000;background:#fff;border:1px solid #d7e2f6;border-radius:8px;box-shadow:0 12px 24px rgba(0,0,0,.16);padding:6px 0;display:none}
    .ctx button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:7px 12px}
    .ctx button:hover{background:#f2f7ff}
    .lbl{font-size:12px;color:#506481}
  </style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div><strong>Print Ready</strong> <span class="text-muted small ms-2">{{ files_count }} files, {{ pages }} pages</span></div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-success" id="btnSaveToMyPc">Save to My PC</button>
      <button class="btn btn-sm btn-outline-dark" id="btnDownloadPdf">Download PDF</button>
      <button class="btn btn-sm btn-primary" id="btnPrintViewer">Print</button>
      <a href="{{ url_for('admin_personal_tools') }}" class="btn btn-sm btn-outline-secondary">Back</a>
    </div>
  </div>
  <div class="bar">
    <button class="btn btn-sm btn-outline-secondary" id="btnPrev">◀</button>
    <span class="lbl">Page</span>
    <input type="number" id="pageNo" class="form-control form-control-sm" style="width:72px" min="1" value="1">
    <span class="lbl">/ <span id="maxPagesLbl">{{ pages }}</span></span>
    <button class="btn btn-sm btn-outline-secondary" id="btnNext">▶</button>
    <span class="vr"></span>
    <button class="btn btn-sm btn-outline-secondary" id="btnZoomOut">-</button>
    <span class="lbl" id="zoomLbl">100%</span>
    <button class="btn btn-sm btn-outline-secondary" id="btnZoomIn">+</button>
    <button class="btn btn-sm btn-outline-secondary" id="btnFitWidth">Fit</button>
    <span class="vr"></span>
    <button class="btn btn-sm btn-outline-primary ms-2" id="btnCropCurrent">Crop Current Page</button>
    <button class="btn btn-sm btn-outline-danger" id="btnResetCrop">Reset Crop</button>
    <span class="vr"></span>
    <button class="btn btn-sm btn-outline-secondary" id="btnRotateCCW">⟲</button>
    <button class="btn btn-sm btn-outline-secondary" id="btnRotateCW">⟳</button>
    <label class="small">Bri</label><input type="range" id="rngBrightness" min="40" max="180" value="100" style="width:80px">
    <label class="small">Con</label><input type="range" id="rngContrast" min="40" max="180" value="100" style="width:80px">
    <button class="btn btn-sm btn-outline-secondary" id="btnUndo">Undo</button>
    <button class="btn btn-sm btn-outline-secondary" id="btnRedo">Redo</button>
    <span class="vr"></span>
    <label class="small">Preset</label>
    <select id="cropPresetSel" class="form-select form-select-sm" style="width:110px"></select>
    <button class="btn btn-sm btn-outline-secondary" id="btnSavePreset">Save Preset</button>
    <label class="small">Range</label>
    <input type="number" id="rangeFrom" class="form-control form-control-sm" style="width:70px" min="1" value="1">
    <input type="number" id="rangeTo" class="form-control form-control-sm" style="width:70px" min="1" value="{{ pages }}">
    <button class="btn btn-sm btn-outline-primary" id="btnApplyRangeCrop">Apply Range Crop</button>
    <span class="vr"></span>
    <button class="btn btn-sm btn-outline-dark" id="btnReorder">Page Reorder</button>
    <span class="text-muted small ms-2">Right-click page for crop</span>
  </div>
  <div class="stage">
    <div class="viewer-shell" id="viewerWrap">
      <div class="thumbs" id="thumbsPane"></div>
      <div class="main" id="mainPane">
        <div class="page-wrap"><canvas id="mainCanvas"></canvas></div>
      </div>
    </div>
  </div>
</div>
<div id="viewerBusy" style="display:none;position:fixed;inset:0;background:rgba(15,18,26,.35);z-index:2400;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #dbe3f4;border-radius:10px;padding:12px 16px;box-shadow:0 8px 20px rgba(0,0,0,.2);font-size:14px;color:#21324d;">
    <span id="viewerBusyText">Preparing...</span>
  </div>
</div>

<div class="ctx" id="viewerCtx">
  <button id="ctxCrop">Crop Current Page</button>
</div>

<div class="modal fade" id="cropModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Crop Page</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div style="height:68vh;border:1px solid #dfe6f5;border-radius:8px;background:#f8fbff;display:flex;align-items:center;justify-content:center;overflow:hidden;">
          <img id="cropImage" alt="" style="max-width:100%;max-height:100%;display:block;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnCropFit">Fit</button>
        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnCropZoomOut">-</button>
        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnCropZoomIn">+</button>
        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnCropRotate">Rotate 90</button>
        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnCropResetSel">Reset</button>
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btnApplyCrop">Apply Crop</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs';
import { PDFDocument } from 'https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/+esm';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs';

const pdfUrl = "{{ pdf_url }}";
let maxPages = {{ pages|int if pages else 1 }};
const pageNo = document.getElementById('pageNo');
const mainCanvas = document.getElementById('mainCanvas');
const thumbsPane = document.getElementById('thumbsPane');
const mainPane = document.getElementById('mainPane');
const viewerWrap = document.getElementById('viewerWrap');
const ctx = document.getElementById('viewerCtx');
const cropModalEl = document.getElementById('cropModal');
const cropModal = new bootstrap.Modal(cropModalEl);
const cropImage = document.getElementById('cropImage');
let cropper = null;
let pdfDocRef = null;
let activePdfUrl = pdfUrl;
let regenBusy = false;
let zoomLevel = 1;
let needsRebuild = true;
let thumbRenderToken = 0;
let renderTick = 0;
let rangeApplyTimer = null;
let rebuildTimer = null;
const pageCache = new Map();
const cropKey = 'pt_print_crops_' + btoa(pdfUrl).replace(/[^a-zA-Z0-9]/g,'');
const presetKey = cropKey + '_presets';
const orderKey = cropKey + '_order';
let cropMap = {};
let cropPresets = {};
let pageOrder = [];
try{ cropMap = JSON.parse(localStorage.getItem(cropKey) || '{}'); }catch(_){ cropMap = {}; }
try{ cropPresets = JSON.parse(localStorage.getItem(presetKey) || '{}'); }catch(_){ cropPresets = {}; }
try{ pageOrder = JSON.parse(localStorage.getItem(orderKey) || '[]'); }catch(_){ pageOrder = []; }
if(!Array.isArray(pageOrder) || !pageOrder.length){ pageOrder = Array.from({length:maxPages},(_,i)=>i+1); }
const historyMap = {};
function ensureHistory(p){ if(!historyMap[p]) historyMap[p]={undo:[],redo:[]}; return historyMap[p]; }
function pushHistory(p){
  const h=ensureHistory(p);
  h.undo.push(JSON.stringify(cropMap[String(p)] || {}));
  if(h.undo.length>30) h.undo.shift();
  h.redo=[];
}
function getEdit(p){
  const e = cropMap[String(p)] || {};
  if(typeof e.rotate!=='number') e.rotate=0;
  if(typeof e.brightness!=='number') e.brightness=100;
  if(typeof e.contrast!=='number') e.contrast=100;
  return e;
}
function saveEdits(){
  localStorage.setItem(cropKey, JSON.stringify(cropMap));
}

function nPage(){
  let n = parseInt(pageNo.value || '1', 10);
  if (isNaN(n) || n < 1) n = 1;
  if (n > maxPages) n = maxPages;
  pageNo.value = n;
  return n;
}
function getViewerPage(){ return nPage(); }

async function renderPageToDataUrl(pageNumber, scale=3){
  const cacheKey = `${pageNumber}:${scale}`;
  const cached = pageCache.get(cacheKey);
  if(cached) return cached;
  if(!pdfDocRef){
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    pdfDocRef = await loadingTask.promise;
    maxPages = pdfDocRef.numPages || maxPages;
    document.getElementById('maxPagesLbl').textContent = String(maxPages);
    if(pageOrder.length!==maxPages) pageOrder = Array.from({length:maxPages},(_,i)=>i+1);
  }
  const pdf = pdfDocRef;
  const page = await pdf.getPage(pageNumber);
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  const ctx2 = canvas.getContext('2d');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: ctx2, viewport }).promise;
  const data = canvas.toDataURL('image/png');
  pageCache.set(cacheKey, data);
  return data;
}
async function renderEditedPageDataUrl(pageNumber, sourceScale=1.4){
  const edit = getEdit(pageNumber);
  let src = edit.dataUrl ? edit.dataUrl : await renderPageToDataUrl(pageNumber, sourceScale);
  const base = await dataUrlToCanvas(src);
  let work = base;
  // apply crop first
  if(edit.cropData){
    const cd = edit.cropData;
    const cx = Math.max(0, Math.floor(cd.x || 0));
    const cy = Math.max(0, Math.floor(cd.y || 0));
    const cw = Math.max(1, Math.floor(cd.width || base.width));
    const ch = Math.max(1, Math.floor(cd.height || base.height));
    const c = document.createElement('canvas'); c.width=cw; c.height=ch;
    c.getContext('2d').drawImage(base, cx, cy, cw, ch, 0, 0, cw, ch);
    work = c;
  }
  // rotate
  if(edit.rotate){
    const deg = ((edit.rotate % 360) + 360) % 360;
    if(deg){
      const rad = deg * Math.PI / 180;
      const swap = deg===90 || deg===270;
      const r = document.createElement('canvas');
      r.width = swap ? work.height : work.width;
      r.height = swap ? work.width : work.height;
      const x = r.getContext('2d');
      x.translate(r.width/2, r.height/2);
      x.rotate(rad);
      x.drawImage(work, -work.width/2, -work.height/2);
      work = r;
    }
  }
  // brightness/contrast
  const b = edit.brightness || 100;
  const cVal = edit.contrast || 100;
  if(b!==100 || cVal!==100){
    const f = document.createElement('canvas'); f.width=work.width; f.height=work.height;
    const x=f.getContext('2d');
    x.filter = `brightness(${b}%) contrast(${cVal}%)`;
    x.drawImage(work,0,0);
    work=f;
  }
  return work.toDataURL('image/png');
}
function dataUrlToCanvas(url){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>{ const c=document.createElement('canvas'); c.width=img.width; c.height=img.height; c.getContext('2d').drawImage(img,0,0); resolve(c); };
    img.onerror = reject;
    img.src = url;
  });
}
function cropFitToWindow(){
  if(!cropper) return;
  try{
    cropper.reset();
    const cd = cropper.getContainerData();
    const id = cropper.getImageData();
    const fit = Math.min(cd.width / id.naturalWidth, cd.height / id.naturalHeight);
    cropper.zoomTo(Math.max(fit * 0.98, 0.08));
  }catch(_){}
}
async function openCrop(){
  const p = getViewerPage();
  const srcPage = pageOrder[p-1] || p;
  // Always open crop editor on full source page (high-res), not previously baked crop.
  // This prevents tiny preview loops after an earlier crop.
  let src = await renderPageToDataUrl(srcPage, 3.4);
  cropImage.src = src;
  cropModal.show();
  setTimeout(()=>{
    if(cropper) cropper.destroy();
    cropper = new Cropper(cropImage,{
      viewMode:1, dragMode:'move', autoCropArea:0.92, responsive:true,
      background:false, rotatable:true, scalable:true, zoomOnWheel:true,
      minContainerWidth: 820,
      minContainerHeight: 420
    });
    setTimeout(()=>{
      cropFitToWindow();
    }, 50);
  },120);
}
document.getElementById('btnCropCurrent').onclick = ()=>openCrop();
document.getElementById('ctxCrop').onclick = ()=>{ ctx.style.display='none'; openCrop(); };
document.getElementById('btnCropFit').onclick = ()=>cropFitToWindow();
document.getElementById('btnCropZoomIn').onclick = ()=>{ if(!cropper) return; try{ cropper.zoom(0.12); }catch(_){} };
document.getElementById('btnCropZoomOut').onclick = ()=>{ if(!cropper) return; try{ cropper.zoom(-0.12); }catch(_){} };
document.getElementById('btnCropRotate').onclick = ()=>{ if(!cropper) return; try{ cropper.rotate(90); }catch(_){} };
document.getElementById('btnCropResetSel').onclick = ()=>{ if(!cropper) return; try{ cropper.reset(); cropFitToWindow(); }catch(_){} };
document.getElementById('btnApplyCrop').onclick = ()=>{
  if(!cropper) return;
  const p = getViewerPage();
  const srcPage = pageOrder[p-1] || p;
  pushHistory(srcPage);
  let cv = null;
  try{
    cv = cropper.getCroppedCanvas({ imageSmoothingEnabled:true, imageSmoothingQuality:'high', fillColor:'#fff', maxWidth:3000, maxHeight:3000 });
  }catch(_){}
  if(!cv || !cv.width || !cv.height){
    alert('Crop apply nahi hua. Crop area select karke dobara try karein.');
    return;
  }
  const e = getEdit(srcPage);
  // Bake crop result directly so coordinates never drift with rotate/reorder edits.
  e.dataUrl = cv.toDataURL('image/png', 0.95);
  delete e.cropData;
  e.rotate = 0;
  e.brightness = 100;
  e.contrast = 100;
  cropMap[String(srcPage)] = e;
  saveEdits();
  markDirty();
  pageNo.value = p;
  renderMainPage();
  renderOneThumb(p);
  cropModal.hide();
};
cropModalEl.addEventListener('hidden.bs.modal', ()=>{ if(cropper){ cropper.destroy(); cropper=null; }});
document.getElementById('btnResetCrop').onclick = ()=>{
  const p = getViewerPage();
  const srcPage = pageOrder[p-1] || p;
  pushHistory(srcPage);
  const e = getEdit(srcPage);
  delete e.cropData; delete e.dataUrl;
  cropMap[String(srcPage)] = e;
  saveEdits();
  markDirty();
  pageNo.value = p;
  renderMainPage();
  renderOneThumb(p);
};
viewerWrap.addEventListener('contextmenu', (e)=>{
  e.preventDefault();
  ctx.style.left = e.clientX + 'px';
  ctx.style.top = e.clientY + 'px';
  ctx.style.display = 'block';
});
document.addEventListener('click', (e)=>{ if(!e.target.closest('#viewerCtx')) ctx.style.display='none'; });
async function rebuildCroppedPdf(){
  if(regenBusy) return;
  regenBusy = true;
  try{
    const hasEdits = Object.values(cropMap).some(v=>v && (v.dataUrl || v.cropData || (v.rotate||0)!==0 || (v.brightness||100)!==100 || (v.contrast||100)!==100));
    const hasReorder = pageOrder.some((n,idx)=>n!==(idx+1));
    if(!hasEdits && !hasReorder){
      activePdfUrl = pdfUrl;
      pdfDocRef = null;
      needsRebuild = false;
      return;
    }
    const srcDocTask = pdfjsLib.getDocument(pdfUrl);
    const srcDoc = await srcDocTask.promise;
    const outDoc = await PDFDocument.create();
    const total = srcDoc.numPages || maxPages;
    const order = (pageOrder && pageOrder.length===total) ? pageOrder.slice() : Array.from({length:total},(_,i)=>i+1);
    for(let oi=0;oi<order.length;oi++){
      const i = order[oi];
      // render based on original source page index i
      pdfDocRef = srcDoc;
      const dataUrl = await renderEditedPageDataUrl(i);
      const img = await outDoc.embedPng(dataUrl);
      const page = outDoc.addPage([img.width, img.height]);
      page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
    }
    const bytes = await outDoc.save();
    const blob = new Blob([bytes], {type:'application/pdf'});
    if(activePdfUrl && activePdfUrl.startsWith('blob:')) URL.revokeObjectURL(activePdfUrl);
    activePdfUrl = URL.createObjectURL(blob);
    pdfDocRef = null;
    needsRebuild = false;
  } finally {
    regenBusy = false;
  }
}
function markDirty(){
  needsRebuild = true;
  scheduleRebuild();
}
async function ensureBuiltPdf(){
  if(needsRebuild) await rebuildCroppedPdf();
}
function scheduleRebuild(){
  if(rebuildTimer) clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(()=>{
    rebuildCroppedPdf();
  }, 1800);
}
function showBusy(text){
  const el = document.getElementById('viewerBusy');
  const tx = document.getElementById('viewerBusyText');
  tx.textContent = text || 'Preparing...';
  el.style.display = 'flex';
}
function hideBusy(){
  document.getElementById('viewerBusy').style.display = 'none';
}

async function blobUrlToDataUrl(url){
  const res = await fetch(url);
  const blob = await res.blob();
  return await new Promise((resolve,reject)=>{
    const fr = new FileReader();
    fr.onload = ()=>resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });
}

async function saveToMyPc(){
  showBusy('Preparing PDF for save...');
  try{
    await ensureBuiltPdf();
    const raw = localStorage.getItem('pt_desktop_state_v3');
    if(!raw){ alert('My PC state not found.'); return; }
    let st = {};
    try{ st = JSON.parse(raw); }catch(_){ st = {}; }
    st.fs = st.fs || {drives:{'D:':{name:'Local Disk (D:)',children:{}},'E:':{name:'Local Disk (E:)',children:{}}},recycle:{}};
    const drive = (prompt('Save Drive (D: or E:)', 'D:') || 'D:').toUpperCase();
    if(!st.fs.drives[drive]){ alert('Invalid drive'); return; }
    const folderPath = (prompt('Folder path inside drive (optional)', '') || '').trim();
    const name = (prompt('File name', 'combined_print_'+Date.now()+'.pdf') || '').trim() || ('combined_print_'+Date.now()+'.pdf');
    const ensure = function(parts){
      let n = st.fs.drives[drive];
      parts.forEach(function(p){
        if(!p) return;
        if(!n.children[p]) n.children[p] = {type:'folder',children:{}};
        n = n.children[p];
      });
      return n;
    };
    const parts = folderPath ? folderPath.split('/').filter(Boolean) : [];
    const parent = ensure(parts);
    let nm = name; let i=1;
    while(parent.children[nm]){ nm = name.replace(/(\.pdf)?$/i,'') + '_' + (i++) + '.pdf'; }
    // Save current PDF source ref (cropped-aware)
    let src = activePdfUrl;
    if(src && src.startsWith('blob:')){
      try{ src = await blobUrlToDataUrl(src); }catch(_){}
    }
    parent.children[nm] = {type:'file',kind:'pdf_saved',source:src,savedAt:Date.now()};
    localStorage.setItem('pt_desktop_state_v3', JSON.stringify(st));
    alert('Saved to My PC: ' + drive + '/' + (folderPath?folderPath+'/':'') + nm);
  } finally {
    hideBusy();
  }
}
document.getElementById('btnSaveToMyPc').onclick = function(){ saveToMyPc(); };
document.getElementById('btnDownloadPdf').onclick = async function(){
  showBusy('Preparing download...');
  try{
    await ensureBuiltPdf();
    const a=document.createElement('a'); a.href=activePdfUrl; a.download='print_ready_' + Date.now() + '.pdf'; a.click();
  } finally {
    hideBusy();
  }
};
document.getElementById('btnPrintViewer').onclick = async function(){
  showBusy('Preparing print preview...');
  let w = null;
  try{
    w = window.open('about:blank','_blank');
    await ensureBuiltPdf();
    if(!w) return;
    w.location = activePdfUrl;
    setTimeout(()=>w.print(),220);
  } finally {
    hideBusy();
  }
};

function updateEditControls(){
  const p = getViewerPage();
  const srcPage = pageOrder[p-1] || p;
  const e = getEdit(srcPage);
  document.getElementById('rngBrightness').value = e.brightness || 100;
  document.getElementById('rngContrast').value = e.contrast || 100;
}
document.getElementById('btnRotateCW').onclick = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; pushHistory(srcPage); const e=getEdit(srcPage); e.rotate=((e.rotate||0)+90)%360; cropMap[String(srcPage)]=e; saveEdits(); markDirty(); renderMainPage(); renderOneThumb(p); };
document.getElementById('btnRotateCCW').onclick = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; pushHistory(srcPage); const e=getEdit(srcPage); e.rotate=((e.rotate||0)-90+360)%360; cropMap[String(srcPage)]=e; saveEdits(); markDirty(); renderMainPage(); renderOneThumb(p); };
document.getElementById('rngBrightness').oninput = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; const e=getEdit(srcPage); e.brightness=parseInt(document.getElementById('rngBrightness').value,10); cropMap[String(srcPage)]=e; saveEdits(); markDirty(); renderMainPage(); if(rangeApplyTimer) clearTimeout(rangeApplyTimer); rangeApplyTimer=setTimeout(()=>renderOneThumb(p),120); };
document.getElementById('rngContrast').oninput = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; const e=getEdit(srcPage); e.contrast=parseInt(document.getElementById('rngContrast').value,10); cropMap[String(srcPage)]=e; saveEdits(); markDirty(); renderMainPage(); if(rangeApplyTimer) clearTimeout(rangeApplyTimer); rangeApplyTimer=setTimeout(()=>renderOneThumb(p),120); };
document.getElementById('btnUndo').onclick = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; const h=ensureHistory(srcPage); if(!h.undo.length) return; h.redo.push(JSON.stringify(cropMap[String(srcPage)]||{})); cropMap[String(srcPage)] = JSON.parse(h.undo.pop()||'{}'); saveEdits(); markDirty(); renderMainPage(); renderOneThumb(p); };
document.getElementById('btnRedo').onclick = ()=>{ const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; const h=ensureHistory(srcPage); if(!h.redo.length) return; h.undo.push(JSON.stringify(cropMap[String(srcPage)]||{})); cropMap[String(srcPage)] = JSON.parse(h.redo.pop()||'{}'); saveEdits(); markDirty(); renderMainPage(); renderOneThumb(p); };

function refreshPresetUI(){
  const sel=document.getElementById('cropPresetSel'); sel.innerHTML='';
  const keys=Object.keys(cropPresets);
  const opt=document.createElement('option'); opt.value=''; opt.textContent='--'; sel.appendChild(opt);
  keys.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o); });
}
document.getElementById('btnSavePreset').onclick = ()=>{
  const p=getViewerPage(); const srcPage=pageOrder[p-1]||p; const e=getEdit(srcPage);
  if(!e.cropData && !e.dataUrl){ alert('Current page par crop apply karein phir preset save karein.'); return; }
  const nm=prompt('Preset name','Preset '+p); if(!nm) return;
  cropPresets[nm]={cropData:e.cropData || null, dataUrl:e.dataUrl || null};
  localStorage.setItem(presetKey, JSON.stringify(cropPresets)); refreshPresetUI();
};
document.getElementById('btnApplyRangeCrop').onclick = ()=>{
  const preset = document.getElementById('cropPresetSel').value;
  if(!preset || !cropPresets[preset]){ alert('Preset select karein.'); return; }
  let f=parseInt(document.getElementById('rangeFrom').value||'1',10);
  let t=parseInt(document.getElementById('rangeTo').value||String(maxPages),10);
  if(isNaN(f)||f<1) f=1; if(isNaN(t)||t>maxPages) t=maxPages; if(f>t){ const x=f; f=t; t=x; }
  for(let p=f;p<=t;p++){
    const srcPage=pageOrder[p-1]||p;
    const e=getEdit(srcPage);
    if(cropPresets[preset].dataUrl){
      e.dataUrl = cropPresets[preset].dataUrl;
      delete e.cropData;
      e.rotate = 0;
      e.brightness = 100;
      e.contrast = 100;
    } else {
      e.cropData = JSON.parse(JSON.stringify(cropPresets[preset].cropData));
      delete e.dataUrl;
    }
    cropMap[String(srcPage)] = e;
  }
  saveEdits();
  markDirty();
  renderMainPage();
  renderThumbs();
};
document.getElementById('btnReorder').onclick = ()=>{
  const current = pageOrder.join(',');
  const raw = prompt('Enter page order (comma separated)', current);
  if(!raw) return;
  const nums = raw.split(',').map(s=>parseInt(s.trim(),10)).filter(n=>!isNaN(n));
  if(nums.length!==maxPages){ alert('Page count mismatch.'); return; }
  const set=new Set(nums); if(set.size!==maxPages){ alert('Duplicate page numbers not allowed.'); return; }
  for(const n of nums){ if(n<1||n>maxPages){ alert('Invalid page no: '+n); return; } }
  pageOrder = nums;
  localStorage.setItem(orderKey, JSON.stringify(pageOrder));
  markDirty();
  renderMainPage();
  renderThumbs();
};
document.getElementById('btnPrev').onclick=()=>{ pageNo.value=Math.max(1,nPage()-1); renderMainPage(); };
document.getElementById('btnNext').onclick=()=>{ pageNo.value=Math.min(maxPages,nPage()+1); renderMainPage(); };
pageNo.onchange=()=>renderMainPage();
document.getElementById('btnZoomIn').onclick=()=>{ zoomLevel=Math.min(3,zoomLevel+0.1); renderMainPage(); };
document.getElementById('btnZoomOut').onclick=()=>{ zoomLevel=Math.max(0.4,zoomLevel-0.1); renderMainPage(); };
document.getElementById('btnFitWidth').onclick=()=>{ zoomLevel=1; renderMainPage(true); };

async function renderMainPage(fit=false){
  const ticket = ++renderTick;
  const p=nPage();
  const srcPage=pageOrder[p-1]||p;
  const url=await renderEditedPageDataUrl(srcPage, 1.5);
  const img=new Image();
  img.onload=function(){
    if(ticket !== renderTick) return;
    const maxW = mainPane.clientWidth - 30;
    let targetScale = zoomLevel;
    if(fit) targetScale = maxW / img.width;
    const w = Math.max(120, Math.floor(img.width * targetScale));
    const h = Math.max(120, Math.floor(img.height * targetScale));
    mainCanvas.width=w; mainCanvas.height=h;
    const cx=mainCanvas.getContext('2d');
    cx.clearRect(0,0,w,h);
    cx.drawImage(img,0,0,w,h);
    document.getElementById('zoomLbl').textContent=Math.round(targetScale*100)+'%';
    updateEditControls();
    highlightThumb(p);
  };
  img.src=url;
}
function highlightThumb(p){
  thumbsPane.querySelectorAll('.thumb').forEach(el=>el.classList.toggle('active', Number(el.dataset.page)===p));
}
async function renderThumbs(){
  const token = ++thumbRenderToken;
  thumbsPane.innerHTML='';
  for(let i=1;i<=maxPages;i++){
    const t=document.createElement('div'); t.className='thumb'; t.dataset.page=String(i);
    const cv=document.createElement('canvas'); cv.width=140; cv.height=180;
    const n=document.createElement('div'); n.className='n'; n.textContent=String(i);
    t.appendChild(cv); t.appendChild(n); thumbsPane.appendChild(t);
    t.onclick=()=>{ pageNo.value=i; renderMainPage(); };
    cv.dataset.page = String(i);
    cv.dataset.pending = '1';
  }
  for(let i=1;i<=maxPages;i++){
    if(token !== thumbRenderToken) return;
    await renderOneThumb(i, token);
  }
  highlightThumb(nPage());
}
async function renderOneThumb(displayPage, token){
  const workToken = token || thumbRenderToken;
  const canvas = thumbsPane.querySelector(`.thumb canvas[data-page="${displayPage}"]`);
  if(!canvas) return;
  if(workToken !== thumbRenderToken) return;
  const srcPage = pageOrder[displayPage-1] || displayPage;
  const edit = getEdit(srcPage);
  const hasEdit = !!(edit.dataUrl || edit.cropData || (edit.rotate||0)!==0 || (edit.brightness||100)!==100 || (edit.contrast||100)!==100);
  const dataUrl = hasEdit ? await renderEditedPageDataUrl(srcPage, 0.6) : await renderPageToDataUrl(srcPage, 0.35);
  if(workToken !== thumbRenderToken) return;
  const img = new Image();
  img.onload = function(){
    if(workToken !== thumbRenderToken) return;
    const ctx2=canvas.getContext('2d');
    const s=Math.min(canvas.width/img.width, canvas.height/img.height);
    const w=Math.floor(img.width*s), h=Math.floor(img.height*s);
    const x=(canvas.width-w)/2, y=(canvas.height-h)/2;
    ctx2.fillStyle='#fff'; ctx2.fillRect(0,0,canvas.width,canvas.height);
    ctx2.drawImage(img,x,y,w,h);
  };
  img.src = dataUrl;
}

window.addEventListener('load', async ()=>{
  refreshPresetUI();
  await renderThumbs();
  await renderMainPage(true);
});
</script>
</body>
</html>

{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>{{ title }}</h4>
    <a href="{{ url_for('dto_txn_list', dto_profile_id=selected_profile_id) }}" class="btn btn-outline-secondary btn-sm">Back to List</a>
  </div>

  <form method="post" enctype="multipart/form-data" class="card card-body">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="date" name="txn_date" class="form-control" value="{{ txn.txn_date if txn else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">DTO Profile</label>
        <select class="form-select" name="dto_profile_id" id="dto_profile_id" required>
          {% for p in profiles %}
            <option value="{{ p.id }}" {% if p.id == selected_profile_id %}selected{% endif %}>{{ p.dto_name }} - {{ p.district.name if p.district else 'N/A' }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">District</label>
        <select class="form-select" name="district_id" required>
          <option value="">-- Select --</option>
          {% for d in districts %}
            <option value="{{ d.id }}" {% if txn and txn.district_id == d.id %}selected{% endif %}>{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Project</label>
        <select class="form-select" name="project_id">
          <option value="">-- Optional --</option>
          {% for p in projects %}
            <option value="{{ p.id }}" {% if txn and txn.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <hr>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Counterparty Type</label>
        <select class="form-select" name="counterparty_type" required>
          <option value="">-- Select --</option>
          {% for x in valid_counterparty_types %}
            <option value="{{ x }}" {% if txn and txn.counterparty_type == x %}selected{% endif %}>{{ x }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Counterparty (existing)</label>
        <select class="form-select" name="counterparty_id">
          <option value="">-- Optional --</option>
          {% for c in counterparties %}
            <option value="{{ c.id }}" {% if txn and txn.counterparty_id == c.id %}selected{% endif %}>{{ c.name }} ({{ c.counterparty_type }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Counterparty Name (required)</label>
        <input class="form-control" name="counterparty_name" value="{{ txn.counterparty_name if txn else '' }}" required>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-md-3">
        <label class="form-label">Mode</label>
        <select class="form-select" name="mode" required>
          <option value="">-- Select --</option>
          {% for x in valid_modes %}
            <option value="{{ x }}" {% if txn and txn.mode == x %}selected{% endif %}>{{ x }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Nature</label>
        <select class="form-select" name="txn_nature" required>
          <option value="">-- Select --</option>
          {% for x in valid_natures %}
            <option value="{{ x }}" {% if txn and txn.txn_nature == x %}selected{% endif %}>{{ x }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Direction</label>
        <select class="form-select" name="direction" required>
          <option value="">-- Select --</option>
          {% for x in valid_directions %}
            <option value="{{ x }}" {% if txn and txn.direction == x %}selected{% endif %}>{{ x }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" min="0" class="form-control" name="amount" value="{{ txn.amount if txn else '' }}" required>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-md-3">
        <label class="form-label">Due Date</label>
        <input type="date" class="form-control" name="due_date" value="{{ txn.due_date if txn else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Reference</label>
        <input class="form-control" name="reference_no" value="{{ txn.reference_no if txn else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Attachment</label>
        <input type="file" class="form-control" name="attachment">
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="is_company_claimable" id="is_claimable" {% if txn and txn.is_company_claimable %}checked{% endif %}>
          <label class="form-check-label" for="is_claimable">Company Claimable</label>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Notes</label>
      <textarea class="form-control" name="notes" rows="3">{{ txn.notes if txn else '' }}</textarea>
    </div>

    {% if txn and txn.attachment_path %}
    <div class="alert alert-info mt-3 mb-0">
      Current attachment: <a href="{{ url_for('static', filename=txn.attachment_path) }}" target="_blank">View File</a>
    </div>
    {% endif %}

    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-primary">Save Transaction</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('dto_txn_list', dto_profile_id=selected_profile_id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Employee expense — EE-{{ rec.id }}{% endblock %}
{% block content %}
<style>
  .eeinv-page { max-width: 100%; width: 100%; margin: 0; padding-left: 0 !important; padding-right: 0 !important; }
  .eeinv-bill { border: 1px solid #e2e8f0; border-top: 3px solid #d97706; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
  .eeinv-hero { background: linear-gradient(135deg, #fffbeb 0%, #fff 55%); border-bottom: 1px solid #fde68a; }
  .eeinv-hlabel { font-size: .65rem; letter-spacing: .08em; color: #b45309; font-weight: 700; }
  .eeinv-htitle { font-size: 1.1rem; font-weight: 700; line-height: 1.2; color: #0f172a; }
  .eeinv-pill { display: inline-flex; align-items: center; gap: .35rem; padding: .2rem .55rem; border-radius: 999px; background: #fffbeb; border: 1px solid #fde68a; }
  .eeinv-pill__k { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; }
  .eeinv-pill__v { font-size: .8rem; font-weight: 700; color: #0f172a; }
  .eeinv-meta--tiles { background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%); }
  .eeinv-meta--4up .eeinv-field { border-radius: 6px; padding: .38rem .45rem; min-height: 3.1rem; display: flex; flex-direction: column; justify-content: center; }
  .eeinv-meta--4up .eeinv-k { font-size: .6rem; letter-spacing: .05em; margin-bottom: .12rem; }
  .eeinv-meta--4up .eeinv-v { font-size: .8rem; line-height: 1.28; }
  .eeinv-brick-row--2 { margin-top: .4rem; padding-top: .45rem; border-top: 1px dashed #fcd34d; }
  .eeinv-brick-row--remarks { margin-top: .45rem; }
  .eeinv-field { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: .5rem .65rem; min-height: 100%; }
  .eeinv-field--remarks { border-style: dashed; background: #fffbeb; }
  .eeinv-k { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; line-height: 1.15; margin-bottom: .2rem; }
  .eeinv-v { font-size: .86rem; font-weight: 600; color: #0f172a; line-height: 1.3; word-break: break-word; }
  .eeinv-mono { font-variant-numeric: tabular-nums; }
  .eeinv-remarks { font-weight: 500; font-size: .84rem; color: #334155; }
  .eeinv-thead th { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; background: #fffbeb !important; border-bottom: 1px solid #fde68a; padding: .4rem .5rem; }
  .eeinv-table { font-size: .86rem; width: 100%; }
  .eeinv-table tbody td { padding: .4rem .5rem; vertical-align: middle; border-color: #e2e8f0; }
  .eeinv-table tbody tr:nth-child(even) { background: #fafafa; }
  .eeinv-tfoot th { background: #fffbeb !important; border-top: 2px solid #fcd34d !important; color: #9a3412; font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; padding: .5rem .5rem; }
  .eeinv-tfoot__label { font-weight: 800 !important; }
  .eeinv-tfoot__amount { font-size: 1.05rem !important; color: #c2410c !important; font-weight: 800 !important; }
  .eeinv-headcard.expense-invoice-bill, .eeinv-lines.expense-invoice-bill { max-width: none; width: 100%; }
  .expense-invoice-bill { border-radius: 10px; }
  @media print {
    .navbar, .sidebar, .flash-message, .d-print-none { display: none !important; }
    .main-content { margin: 0 !important; margin-top: 0 !important; padding: 6px !important; }
    .expense-invoice-bill { border: 1px solid #000 !important; box-shadow: none !important; page-break-inside: avoid; }
    .eeinv-table { font-size: 9pt; }
    .eeinv-tfoot th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
<div class="container-fluid py-2 px-0 eeinv-page">
  <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2 d-print-none">
    <div class="small text-muted fw-semibold text-uppercase" style="letter-spacing:.04em">Invoice view</div>
    <div class="d-flex flex-wrap gap-1">
      <a href="{{ back_url if back_url is defined else url_for('employee_expense_list') }}" class="btn btn-outline-secondary btn-sm py-1"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <button type="button" class="btn btn-primary btn-sm py-1" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
      <a href="{{ url_for('employee_expense_media', pk=rec.id) }}{% if return_to_path is defined and return_to_path %}?return_to={{ return_to_path|url_quote }}{% endif %}" class="btn btn-outline-primary btn-sm py-1"><i class="bi bi-images me-1"></i>Media</a>
    </div>
  </div>

  <div id="expense-invoice-print-root" class="eeinv-page">
  {% include 'finance/employee_expense_invoice_body.html' %}
  </div>
</div>
{% endblock %}

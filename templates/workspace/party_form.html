{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-3">
  {% include "workspace/_nav.html" %}
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white"><strong>{{ 'Edit' if row else 'Add' }} Workspace Party</strong></div>
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ row.name if row else '' }}" required></div>
          <div class="col-md-3"><label class="form-label">Type</label><input type="text" name="party_type" class="form-control" value="{{ row.party_type if row else '' }}"></div>
          <div class="col-md-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ row.phone if row else '' }}"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ row.address if row else '' }}</textarea></div>
          <div class="col-md-3">
            <label class="form-label">Status</label>
            <select name="is_active" class="form-select">
              <option value="1" {% if not row or row.is_active %}selected{% endif %}>Active</option>
              <option value="0" {% if row and not row.is_active %}selected{% endif %}>Inactive</option>
            </select>
          </div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('workspace_parties_list') }}" class="btn btn-outline-secondary">Back</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-3">
  {% include "workspace/_nav.html" %}
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white"><strong>{{ 'Edit' if row else 'Add' }} Workspace Transfer</strong></div>
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-3"><label class="form-label">Date</label><input type="date" name="transfer_date" class="form-control" value="{{ row.transfer_date if row else '' }}" required></div>
          <div class="col-md-3"><label class="form-label">Amount</label><input type="number" step="0.01" name="amount" class="form-control" value="{{ row.amount if row else '' }}" required></div>
          <div class="col-md-3"><label class="form-label">Payment Mode</label><input type="text" name="payment_mode" class="form-control" value="{{ row.payment_mode if row else 'Cash' }}"></div>
          <div class="col-md-3"><label class="form-label">Category</label><input type="text" name="category" class="form-control" value="{{ row.category if row else '' }}"></div>
          <div class="col-md-6"><label class="form-label">From Account</label>
            <select name="from_account_id" class="form-select search-select" required>
              <option value="">-- Select --</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if row and row.from_account_id == a.id %}selected{% endif %}>{{ a.code }} - {{ a.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">To Account (optional if Party/Driver selected)</label>
            <select name="to_account_id" class="form-select search-select">
              <option value="">-- Auto from Party/Driver --</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if row and row.to_account_id == a.id %}selected{% endif %}>{{ a.code }} - {{ a.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">To Workspace Party</label>
            <select name="to_workspace_party_id" class="form-select search-select">
              <option value="">-- None --</option>
              {% for p in parties %}
              <option value="{{ p.id }}" {% if row and row.to_workspace_party_id == p.id %}selected{% endif %}>{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">To Driver</label>
            <select name="to_driver_id" class="form-select search-select">
              <option value="">-- None --</option>
              {% for d in drivers %}
              <option value="{{ d.id }}" {% if row and row.to_driver_id == d.id %}selected{% endif %}>{{ d.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Reference No</label><input type="text" name="reference_no" class="form-control" value="{{ row.reference_no if row else '' }}"></div>
          <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ row.description if row else '' }}</textarea></div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('workspace_fund_transfers_list') }}" class="btn btn-outline-secondary">Back</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

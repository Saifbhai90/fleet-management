{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-3">
  {% include "workspace/_nav.html" %}
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white"><strong>{{ 'Edit' if row else 'Add' }} Workspace Transfer</strong></div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label fw-semibold">Transfer Date</label>
            <input type="text" name="transfer_date" class="form-control datepicker" value="{{ row.transfer_date|ddmmyyyy if row and row.transfer_date else '' }}" placeholder="dd-mm-yyyy" required>
          </div>
          <div class="col-md-3"><label class="form-label fw-semibold">Amount</label><input type="number" step="0.01" name="amount" class="form-control" value="{{ row.amount if row else '' }}" required></div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Payment Mode</label>
            {% set pm = (row.payment_mode if row else 'Cash') %}
            <select name="payment_mode" class="form-select">
              <option value="Cash" {% if pm == 'Cash' %}selected{% endif %}>Cash</option>
              <option value="Bank Transfer" {% if pm == 'Bank Transfer' %}selected{% endif %}>Bank Transfer</option>
              <option value="Cheque" {% if pm == 'Cheque' %}selected{% endif %}>Cheque</option>
              <option value="Online" {% if pm == 'Online' %}selected{% endif %}>Online Payment</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Category / Purpose</label>
            <select name="category" class="form-select search-select">
              <option value="">-- Select / Optional --</option>
              {% for c in categories %}
              <option value="{{ c.name }}" {% if row and row.category == c.name %}selected{% endif %}>{{ c.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">From Account</label>
            <select name="from_account_id" class="form-select search-select" required>
              <option value="">-- Select --</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if row and row.from_account_id == a.id %}selected{% endif %}>{{ a.code }} - {{ a.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">To Account</label>
            <select name="to_account_id" class="form-select search-select">
              <option value="">-- Select --</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if row and row.to_account_id == a.id %}selected{% endif %}>{{ a.code }} - {{ a.name }} ({{ a.account_type }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Attachment (Image)</label>
            <input type="file" name="attachment" class="form-control" accept="image/*">
            {% if existing_attachment %}
            <div class="mt-2">
              <small class="text-muted">Current:</small>
              <a href="{{ existing_attachment }}" target="_blank" class="ms-1">
                <img src="{{ existing_attachment }}" style="max-height:50px;border-radius:4px" alt="current">
              </a>
              <label class="ms-2 text-danger" style="font-size:.78rem;cursor:pointer">
                <input type="checkbox" name="remove_attachment" value="1" class="form-check-input form-check-input-sm me-1">Remove
              </label>
            </div>
            {% endif %}
          </div>
          <div class="col-md-4"><label class="form-label">Reference No</label><input type="text" name="reference_no" class="form-control" value="{{ row.reference_no if row else '' }}"></div>
          <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ row.description if row else '' }}</textarea></div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('workspace_fund_transfers_list') }}" class="btn btn-outline-secondary">Back</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-3">
  {% include "workspace/_nav.html" %}
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white"><strong>{{ 'Edit' if row else 'Add' }} Workspace Expense</strong></div>
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-3"><label class="form-label">Date</label><input type="date" name="expense_date" class="form-control" required value="{{ row.expense_date if row else '' }}"></div>
          <div class="col-md-3"><label class="form-label">Type</label><input type="text" name="expense_type" class="form-control" value="{{ row.expense_type if row else 'General' }}"></div>
          <div class="col-md-3"><label class="form-label">Amount</label><input type="number" step="0.01" name="amount" class="form-control" required value="{{ row.amount if row else '' }}"></div>
          <div class="col-md-3"><label class="form-label">Payment Mode</label><input type="text" name="payment_mode" class="form-control" value="{{ row.payment_mode if row else 'Cash' }}"></div>
          <div class="col-md-4"><label class="form-label">Workspace Party</label>
            <select class="form-select search-select" name="workspace_party_id">
              <option value="">-- None --</option>
              {% for p in parties %}
              <option value="{{ p.id }}" {% if row and row.workspace_party_id == p.id %}selected{% endif %}>{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Driver</label>
            <select class="form-select search-select" name="to_driver_id">
              <option value="">-- None --</option>
              {% for d in drivers %}
              <option value="{{ d.id }}" {% if row and row.to_driver_id == d.id %}selected{% endif %}>{{ d.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Product (Optional)</label>
            <select class="form-select search-select" name="workspace_product_id">
              <option value="">-- None --</option>
              {% for p in products %}
              <option value="{{ p.id }}" {% if row and row.workspace_product_id == p.id %}selected{% endif %}>{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Category</label><input type="text" name="category" class="form-control" value="{{ row.category if row else '' }}"></div>
          <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3" required>{{ row.description if row else '' }}</textarea></div>
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('workspace_expenses_list') }}" class="btn btn-outline-secondary">Back</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

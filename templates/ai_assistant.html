{% extends "base.html" %}
{% block title %}Master Mind AI - Fleet Manager{% endblock %}

{% block content %}
<style>
  .ai-shell { display: grid; grid-template-columns: 300px 1fr; gap: 16px; min-height: calc(100vh - 110px); }
  .ai-panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 8px 24px rgba(2, 6, 23, 0.05); }
  .ai-sidebar { padding: 14px; display:flex; flex-direction:column; min-height: 0; }
  .ai-history-list { overflow:auto; max-height: calc(100vh - 210px); padding-right: 2px; }
  .ai-chat { display: flex; flex-direction: column; min-height: 0; }
  .ai-header { border-bottom: 1px solid #edf2f7; padding: 14px 18px; display:flex; align-items:center; justify-content:space-between; }
  .ai-history-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-bottom: 8px; background: #f8fafc; }
  .ai-history-item:hover { background: #eef2ff; border-color: #c7d2fe; }
  .ai-history-row { display: flex; align-items: flex-start; gap: 8px; justify-content: space-between; }
  .ai-history-actions { display: flex; gap: 2px; flex-shrink: 0; align-items: flex-start; }
  .btn-history-act { padding: 4px 6px; line-height: 1; border: none; background: transparent; color: #64748b; border-radius: 6px; cursor: pointer; }
  .btn-history-act:hover { background: #e2e8f0; color: #1e293b; }
  .ai-messages { flex: 1; padding: 16px; overflow: auto; background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); }
  .msg { max-width: 80%; padding: 12px 14px; border-radius: 14px; margin-bottom: 12px; white-space: pre-wrap; }
  .msg-user { margin-left: auto; background: #2563eb; color: #fff; border-bottom-right-radius: 6px; }
  .msg-ai { margin-right: auto; background: #fff; border: 1px solid #e2e8f0; color: #1f2937; border-bottom-left-radius: 6px; }
  .msg-tools { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .ai-input-wrap { border-top: 1px solid #edf2f7; padding: 12px; display: flex; gap: 10px; align-items: flex-end; }
  .ai-textarea { min-height: 56px; max-height: 160px; resize: vertical; }
  .thinking { display:inline-flex; gap:6px; align-items:center; }
  .thinking span { width: 7px; height: 7px; border-radius: 999px; background:#64748b; animation: blink 1.1s infinite ease-in-out; }
  .thinking span:nth-child(2){ animation-delay:.15s; }
  .thinking span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink { 0%, 80%, 100% { transform: scale(.6); opacity:.35; } 40% { transform: scale(1); opacity:1; } }
  @media (max-width: 992px) { .ai-shell { grid-template-columns: 1fr; } .msg{max-width:92%;} }
</style>

<div class="container-fluid py-3">
  <div class="ai-shell">
    <aside class="ai-panel ai-sidebar">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <h6 class="mb-0 fw-bold"><i class="bi bi-stars text-warning me-1"></i>Recent Chats</h6>
        <div class="d-flex gap-1">
          <button id="historyBtn" class="btn btn-sm btn-outline-secondary">History</button>
          <button id="newChatBtn" class="btn btn-sm btn-outline-primary">New</button>
        </div>
      </div>
      <div id="historyList" class="ai-history-list"></div>
    </aside>

    <section class="ai-panel ai-chat">
      <div class="ai-header">
        <div>
          <div class="fw-bold"><i class="bi bi-robot me-1 text-primary"></i>Master Mind AI Analytics Engine</div>
          <small class="text-muted">Ask anything about Fleet, Payroll, Attendance, Fuel, Workspace and more.</small>
        </div>
      </div>

      <div id="messages" class="ai-messages"></div>

      <div class="ai-input-wrap">
        <textarea id="aiInput" class="form-control ai-textarea" placeholder="Example: Muzaffargarh mein pichlay mahine fuel expense trend ka chart dikhao."></textarea>
        <button id="sendBtn" class="btn btn-primary"><i class="bi bi-send"></i></button>
      </div>
    </section>
  </div>
</div>

<div class="modal fade" id="allHistoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-clock-history me-1"></i>Chat History</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input id="historySearch" type="text" class="form-control mb-3" placeholder="Search history...">
        <div id="allHistoryList"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function () {
  var history = [];
  var currentConversationId = null;
  var thinkingNode = null;

  var messagesEl = document.getElementById('messages');
  var historyEl = document.getElementById('historyList');
  var inputEl = document.getElementById('aiInput');
  var sendBtn = document.getElementById('sendBtn');
  var newChatBtn = document.getElementById('newChatBtn');
  var historyBtn = document.getElementById('historyBtn');
  var allHistoryListEl = document.getElementById('allHistoryList');
  var historySearchEl = document.getElementById('historySearch');
  var csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
  var allHistoryModalEl = document.getElementById('allHistoryModal');
  var historyModal = allHistoryModalEl ? new bootstrap.Modal(allHistoryModalEl, { backdrop: false, focus: false, keyboard: true }) : null;

  function fetchConversations() {
    return fetch('/api/ai/conversations')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.ok || !Array.isArray(data.items)) return [];
        return data.items.map(function (it) {
          return {
            id: it.id,
            title: it.title || ('Chat #' + it.id),
            ts: it.updated_at ? new Date(it.updated_at).getTime() : Date.now(),
            meta: (it.message_count || 0) + ' msgs',
            is_pinned: !!it.is_pinned
          };
        });
      })
      .catch(function () { return []; });
  }

  function loadHistory() {
    history = [];
    renderHistory();
    refreshConversationLists();
  }

  function refreshConversationLists() {
    return fetchConversations().then(function (items) {
      history = items.slice(0, 200);
      renderHistory();
      renderAllHistory();
    });
  }

  function patchConversation(id, body) {
    return fetch('/api/ai/conversations/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrfToken
      },
      body: JSON.stringify(body)
    }).then(function (r) { return r.json(); });
  }

  function deleteConversation(id) {
    return fetch('/api/ai/conversations/' + encodeURIComponent(id), {
      method: 'DELETE',
      headers: { 'X-CSRFToken': csrfToken }
    }).then(function (r) { return r.json(); });
  }

  function createConversationRow(item, opts) {
    opts = opts || {};
    var wrap = document.createElement('div');
    wrap.className = 'ai-history-item';

    var row = document.createElement('div');
    row.className = 'ai-history-row';

    var main = document.createElement('div');
    main.className = 'flex-grow-1';
    main.style.minWidth = '0';
    main.style.cursor = 'pointer';

    var titleEl = document.createElement('div');
    titleEl.className = 'fw-semibold small';
    if (item.is_pinned) {
      var pi = document.createElement('i');
      pi.className = 'bi bi-pin-angle-fill text-warning me-1';
      pi.title = 'Pinned';
      titleEl.appendChild(pi);
    }
    titleEl.appendChild(document.createTextNode(item.title || 'Chat'));

    var d1 = document.createElement('div');
    d1.className = 'text-muted small';
    d1.textContent = new Date(item.ts).toLocaleString();

    main.appendChild(titleEl);
    main.appendChild(d1);
    if (item.meta) {
      var d2 = document.createElement('div');
      d2.className = 'text-muted small';
      d2.textContent = item.meta;
      main.appendChild(d2);
    }

    main.addEventListener('click', function () {
      loadHistoryItem(item);
      if (opts.closeModalOnPick && historyModal) historyModal.hide();
    });

    var actions = document.createElement('div');
    actions.className = 'ai-history-actions';

    function mkBtn(iconClass, btnTitle, handler) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'btn-history-act';
      b.title = btnTitle;
      b.innerHTML = '<i class="bi ' + iconClass + '"></i>';
      b.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        handler(b);
      });
      actions.appendChild(b);
    }

    mkBtn(item.is_pinned ? 'bi-pin-angle-fill text-warning' : 'bi-pin-angle', item.is_pinned ? 'Unpin' : 'Pin', function () {
      patchConversation(item.id, { is_pinned: !item.is_pinned }).then(function (data) {
        if (!data || !data.ok || !data.conversation) return;
        item.is_pinned = !!data.conversation.is_pinned;
        refreshConversationLists();
      });
    });

    mkBtn('bi-pencil', 'Rename', function () {
      var t = prompt('Chat title:', item.title || '');
      if (t === null) return;
      t = String(t).trim();
      if (!t) return;
      patchConversation(item.id, { title: t }).then(function (data) {
        if (!data || !data.ok || !data.conversation) return;
        item.title = data.conversation.title;
        refreshConversationLists();
      });
    });

    mkBtn('bi-trash', 'Delete', function () {
      if (!confirm('Delete this chat permanently?')) return;
      deleteConversation(item.id).then(function (data) {
        if (!data || !data.ok) return;
        if (currentConversationId === item.id) {
          currentConversationId = null;
          messagesEl.innerHTML = '';
          addMessage('Chat deleted. Start a new conversation anytime.', 'ai');
        }
        refreshConversationLists();
      });
    });

    row.appendChild(main);
    row.appendChild(actions);
    wrap.appendChild(row);
    return wrap;
  }

  function loadHistoryItem(item) {
    if (!item || !item.id) {
      addMessage('Selected chat has no saved content yet.', 'ai');
      return;
    }
    fetch('/api/ai/conversations/' + encodeURIComponent(item.id))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data || !data.ok) {
          addMessage((data && data.error) || 'Unable to load selected conversation.', 'ai');
          return;
        }
        currentConversationId = item.id;
        renderConversationMessages(data.messages || []);
      })
      .catch(function (err) {
        addMessage('Unable to open chat history: ' + (err && err.message ? err.message : err), 'ai');
      });
  }

  function renderConversationMessages(messages) {
    messagesEl.innerHTML = '';
    if (!Array.isArray(messages) || !messages.length) {
      addMessage('No messages in this conversation yet.', 'ai');
      return;
    }
    messages.forEach(function (m) {
      var node = addMessage(m.content || '', m.role === 'user' ? 'user' : 'ai');
      if (m.role === 'assistant') {
        if (m.sql_query) addSqlButton(node, m.sql_query);
        if (m.chart_data) addChart(node, m.chart_data);
      }
    });
  }

  function renderHistory() {
    historyEl.innerHTML = '';
    if (!history.length) {
      historyEl.innerHTML = '<div class="text-muted small">No chat yet.</div>';
      return;
    }
    var previewItems = history.slice(0, 6);
    previewItems.forEach(function (item, idx) {
      var div = createConversationRow(item, {});
      if (idx === 0) div.style.borderColor = '#93c5fd';
      historyEl.appendChild(div);
    });
    if (history.length > 6) {
      var more = document.createElement('button');
      more.className = 'btn btn-sm btn-light w-100 mt-1';
      more.textContent = 'View all history (' + history.length + ')';
      more.addEventListener('click', function () { if (historyModal) historyModal.show(); });
      historyEl.appendChild(more);
    }
  }

  function renderAllHistory() {
    if (!allHistoryListEl) return;
    var q = (historySearchEl && historySearchEl.value || '').trim().toLowerCase();
    allHistoryListEl.innerHTML = '';
    var filtered = history.filter(function (item) {
      if (!q) return true;
      var t = (item.title || '').toLowerCase();
      var m = (item.meta || '').toLowerCase();
      return t.indexOf(q) !== -1 || m.indexOf(q) !== -1;
    });
    if (!filtered.length) {
      allHistoryListEl.innerHTML = '<div class="text-muted small">No matching history.</div>';
      return;
    }
    filtered.forEach(function (item) {
      allHistoryListEl.appendChild(createConversationRow(item, { closeModalOnPick: true }));
    });
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function (m) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m];
    });
  }

  function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-ai');
    div.innerHTML = escapeHtml(text || '');
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showThinking() {
    if (thinkingNode) return;
    thinkingNode = document.createElement('div');
    thinkingNode.className = 'msg msg-ai';
    thinkingNode.innerHTML = '<div class="thinking"><span></span><span></span><span></span><span class="ms-2 small text-muted">Thinking...</span></div>';
    messagesEl.appendChild(thinkingNode);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideThinking() {
    if (!thinkingNode) return;
    thinkingNode.remove();
    thinkingNode = null;
  }

  function addSqlButton(container, sqlText) {
    var tools = document.createElement('div');
    tools.className = 'msg-tools';
    var btn = document.createElement('button');
    btn.className = 'btn btn-sm btn-outline-secondary';
    btn.textContent = 'Copy SQL';
    btn.addEventListener('click', function () {
      navigator.clipboard.writeText(sqlText || '');
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = 'Copy SQL'; }, 1200);
    });
    tools.appendChild(btn);
    container.appendChild(tools);
  }

  function addNextSteps(container, steps) {
    if (!Array.isArray(steps) || !steps.length) return;
    var box = document.createElement('div');
    box.className = 'mt-2';
    box.innerHTML = '<div class="small fw-semibold mb-1 text-primary">Next Steps</div>';
    steps.forEach(function (s) {
      if (!s || !s.label || !s.url) return;
      var a = document.createElement('a');
      a.href = s.url;
      a.className = 'btn btn-sm btn-outline-primary me-2 mb-2';
      a.textContent = s.label;
      box.appendChild(a);
    });
    container.appendChild(box);
  }

  function addChart(container, chartData) {
    if (!chartData || !chartData.labels || !chartData.datasets) return;
    var canvas = document.createElement('canvas');
    canvas.height = 220;
    container.appendChild(canvas);
    new Chart(canvas.getContext('2d'), {
      type: chartData.type || 'bar',
      data: { labels: chartData.labels, datasets: chartData.datasets },
      options: { responsive: true, plugins: { legend: { display: true }, title: { display: !!chartData.title, text: chartData.title || '' } } }
    });
  }

  function persistCurrentChat() {
    refreshConversationLists();
  }

  async function submitQuery(forcedMessage, keepInput) {
    var msg = (forcedMessage || inputEl.value || '').trim();
    if (!msg) return;
    if (!keepInput) inputEl.value = '';
    addMessage(msg, 'user');
    showThinking();
    sendBtn.disabled = true;
    try {
      var resp = await fetch('/api/ai/query', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ message: msg, conversation_id: currentConversationId })
      });
      var ct = (resp.headers.get('content-type') || '').toLowerCase();
      var data;
      if (ct.indexOf('application/json') !== -1) {
        data = await resp.json();
      } else {
        var txt = await resp.text();
        hideThinking();
        addMessage('API returned non-JSON response (likely login/session redirect or server HTML error). Please refresh and login again.', 'ai');
        if (txt) console.error('[AI API non-JSON]', txt.slice(0, 500));
        return;
      }
      hideThinking();
      if (!data.ok) {
        addMessage(data.error || 'Request failed.', 'ai');
      } else {
        if (data.conversation_id) currentConversationId = data.conversation_id;
        var aiNode = addMessage(data.answer || 'No answer generated.', 'ai');
        if (data.sql) addSqlButton(aiNode, data.sql);
        if (data.chart_data) addChart(aiNode, data.chart_data);
        if (data.next_steps) addNextSteps(aiNode, data.next_steps);
        persistCurrentChat();
      }
    } catch (err) {
      hideThinking();
      addMessage('Network/API issue: ' + (err && err.message ? err.message : err), 'ai');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', submitQuery);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitQuery();
    }
  });
  newChatBtn.addEventListener('click', function () {
    fetch('/api/ai/conversations/new', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
      body: JSON.stringify({ title: 'New AI Chat' })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        currentConversationId = (data && data.ok && data.id) ? data.id : null;
        messagesEl.innerHTML = '';
        inputEl.focus();
        persistCurrentChat();
      })
      .catch(function () {
        currentConversationId = null;
        messagesEl.innerHTML = '';
        inputEl.focus();
      });
  });
  if (historyBtn) {
    historyBtn.addEventListener('click', function () {
      renderAllHistory();
      if (historyModal) historyModal.show();
    });
  }
  if (historySearchEl) {
    historySearchEl.addEventListener('input', renderAllHistory);
  }

  loadHistory();
  renderAllHistory();
  addMessage('Master Mind AI ready. Aap data question puchain, chart bhi bana dunga.', 'ai');
})();
</script>
{% endblock %}

# Render Blueprint — one-click infra that matches this repo (see RENDER_SCALING_GUIDE.md).
# After push: Dashboard → New → Blueprint → connect repo → apply. Set any extra secrets (R2, Firebase, mail) in the Web Service → Environment.
version: "1"
databases:
  - name: company-management-db
    databaseName: company_management
    user: company_app
    plan: free
services:
  - type: web
    name: fleet-manager
    runtime: python
    plan: free
    buildCommand: sh scripts/render_build.sh
    # Matches Procfile; bind 0.0.0.0:$PORT per https://render.com/docs/web-services#port-binding
    # Starter ~512MB: use 1 worker so backup + Flask stays under RAM (was OOM with workers=2)
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 1 --worker-class gthread --threads 4
    preDeployCommand: sh scripts/render_migrate.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: company-management-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: app:app
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: BACKUP_INCLUDE_UPLOADS
        value: "false"
      - key: BACKUP_EXCLUDE_TABLES
        value: activity_log,client_activity_log,login_log,login_attempt
      - key: BACKUP_COMPACT
        value: "true"
